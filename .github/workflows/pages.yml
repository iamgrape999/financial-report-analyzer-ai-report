name: Deploy static frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "static/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static files exist
        run: |
          echo "Checking static/index.html..."
          test -f static/index.html || { echo "ERROR: static/index.html not found"; exit 1; }
          SIZE=$(wc -c < static/index.html)
          echo "static/index.html size: ${SIZE} bytes"
          test "$SIZE" -gt 1000 || { echo "ERROR: static/index.html is too small (${SIZE} bytes)"; exit 1; }
          echo "OK: static/index.html validated (${SIZE} bytes)"

      - name: Validate HTML structure
        run: |
          python3 - <<'PYEOF'
          import sys, re
          html = open("static/index.html", encoding="utf-8").read()
          errors = []
          if "<!DOCTYPE html>" not in html:
              errors.append("Missing <!DOCTYPE html>")
          if "<html" not in html:
              errors.append("Missing <html> tag")
          if "<head>" not in html and "<head " not in html:
              errors.append("Missing <head> element")
          if "<body" not in html:
              errors.append("Missing <body> element")
          if errors:
              for e in errors:
                  print(f"::error file=static/index.html::{e}")
              sys.exit(1)
          print(f"HTML structure OK — {len(html):,} chars")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "static"

  deploy:
    name: deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
