name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Python tests and UI smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q credit_report main.py scripts tests conftest.py pytest_asyncio.py

      - name: Run unit tests
        run: python -m pytest -q

      - name: Check browser UI JavaScript syntax
        run: node --check credit_report/ui/app.js

      - name: Run browser-free UI smoke test
        run: scripts/ui_smoke_test.py
