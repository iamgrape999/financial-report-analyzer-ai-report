name: CI

on:
  push:
    branches: ["main", "claude/**", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Syntax check
        run: python -m compileall -q credit_report main.py

      - name: Run pytest (unit + mock pipeline)
        env:
          GEMINI_API_KEY: mock-key-for-testing
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: admin123
          ENVIRONMENT: development
          AUTO_CREATE_TABLES: "true"
        run: python -m pytest tests/ -v --tb=short

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: .pytest_cache/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linters
        run: pip install ruff
      - name: ruff check
        run: ruff check credit_report main.py --select E,F,W --ignore E501,W191 || true
