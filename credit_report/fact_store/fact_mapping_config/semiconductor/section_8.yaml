# Section 8 — ACRA Banking Charges: fact extraction mappings
# Paths match the actual FORM FIELD_DEFS paths:
#   8A_acra_banking_charges.* — summary fields hoisted by _flatten_section8()
#   8B_other_information.* — qualitative flags (boolean/text, not numeric)
facts:
  # ── ACRA Summary Counts (hoisted from summary by _flatten_section8) ────────
  - id_template: "ACRA-TOTAL-CHARGES-{entity}-CURRENT"
    path: "8A_acra_banking_charges.total_charges"
    metric: "total_acra_charges"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "count"

  - id_template: "ACRA-ACTIVE-CHARGES-{entity}-CURRENT"
    path: "8A_acra_banking_charges.active_charges"
    metric: "active_acra_charges"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "count"

  - id_template: "ACRA-SATISFIED-CHARGES-{entity}-CURRENT"
    path: "8A_acra_banking_charges.satisfied_charges"
    metric: "satisfied_acra_charges"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "count"

  # ── ACRA Amounts ──────────────────────────────────────────────────────────
  - id_template: "ACRA-TOTAL-ACTIVE-USD-{entity}-CURRENT"
    path: "8A_acra_banking_charges.total_active_usd_m"
    metric: "acra_total_active_usd_m"
    entity: "BORROWER"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "ACRA-CUB-COUNT-{entity}-CURRENT"
    path: "8A_acra_banking_charges.cub_charge_count"
    metric: "cub_charge_count"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "count"

  - id_template: "ACRA-CUB-TOTAL-USD-{entity}-CURRENT"
    path: "8A_acra_banking_charges.cub_total_usd_m"
    metric: "cub_acra_total_usd_m"
    entity: "BORROWER"
    period: "CURRENT"
    currency: "USD"
    unit: "million"
