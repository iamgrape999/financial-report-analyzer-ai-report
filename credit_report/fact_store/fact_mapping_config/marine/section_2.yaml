# Section 2 — Overall Comments: fact extraction mappings
# Paths match the ETL schema keys that Gemini populates into the form JSON:
#   2B_solvency.ema.*      — borrower snapshot (EMA or equivalent)
#   2B_solvency.deal_dscr  — deal-level DSCR
#   2C_guarantor.*         — guarantor snapshot
facts:
  # Deal DSCR
  - id_template: "RATIO-DSCR-DEAL-{entity}-{period}"
    path: "2B_solvency.deal_dscr.dscr_value"
    metric: "dscr"
    entity: "BORROWER"
    period_path: "2B_solvency.deal_dscr.period_label"
    unit: "x"

  # Borrower EMA solvency snapshot
  - id_template: "RATIO-DEBT-EBITDA-{entity}-{period}"
    path: "2B_solvency.ema.debt_ebitda_ratio"
    metric: "debt_ebitda"
    entity: "BORROWER"
    period_path: "2B_solvency.ema.period"
    unit: "x"

  - id_template: "RATIO-ICR-{entity}-{period}"
    path: "2B_solvency.ema.interest_coverage"
    metric: "interest_coverage"
    entity: "BORROWER"
    period_path: "2B_solvency.ema.period"
    unit: "x"

  - id_template: "FIN-EBITDA-USD-{entity}-{period}"
    path: "2B_solvency.ema.op_ebitda_bn_usd"
    metric: "ema_ebitda_usd_bn"
    entity: "BORROWER"
    period_path: "2B_solvency.ema.period"
    currency: "USD"
    unit: "bn"

  - id_template: "FIN-DEBT-USD-{entity}-{period}"
    path: "2B_solvency.ema.total_debt_bn_usd"
    metric: "ema_total_debt_usd_bn"
    entity: "BORROWER"
    period_path: "2B_solvency.ema.period"
    currency: "USD"
    unit: "bn"

  # Guarantor solvency snapshot (2C_guarantor)
  - id_template: "FIN-CASH-USD-{entity}-{period}"
    path: "2C_guarantor.cash_usd_bn"
    metric: "guarantor_cash_usd_bn"
    entity_path: "2C_guarantor.guarantor_name_abbrev"
    period_path: "2C_guarantor.period"
    currency: "USD"
    unit: "bn"

  - id_template: "FIN-CASH-TWD-{entity}-{period}"
    path: "2C_guarantor.cash_twd_bn"
    metric: "guarantor_cash_twd_bn"
    entity_path: "2C_guarantor.guarantor_name_abbrev"
    period_path: "2C_guarantor.period"
    currency: "TWD"
    unit: "bn"

  - id_template: "FIN-DEBT-USD-{entity}-{period}"
    path: "2C_guarantor.total_debt_usd_bn"
    metric: "guarantor_total_debt_usd_bn"
    entity_path: "2C_guarantor.guarantor_name_abbrev"
    period_path: "2C_guarantor.period"
    currency: "USD"
    unit: "bn"

  - id_template: "FIN-DEBT-TWD-{entity}-{period}"
    path: "2C_guarantor.total_debt_twd_bn"
    metric: "guarantor_total_debt_twd_bn"
    entity_path: "2C_guarantor.guarantor_name_abbrev"
    period_path: "2C_guarantor.period"
    currency: "TWD"
    unit: "bn"

  - id_template: "RATIO-ICR-{entity}-{period}"
    path: "2C_guarantor.interest_coverage"
    metric: "guarantor_interest_coverage"
    entity_path: "2C_guarantor.guarantor_name_abbrev"
    period_path: "2C_guarantor.period"
    unit: "x"
