# Section 6 — Project Analysis: fact extraction mappings
# Paths match the form JSON structure: 6A_project.*, 6B_builder.*, 6D_milestones.*, 6E_rg_mechanism.*
# ETL normalises 6D_milestones.milestones[] → flat m1_*/m2_* keys before storing as SectionInput.
facts:
  # ── 6A Project Overview ─────────────────────────────────────────────────
  - id_template: "FAC-VESSEL-TEU-{entity}-{period}"
    path: "6A_project.teu"
    metric: "vessel_teu"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "TEU"

  - id_template: "FAC-VESSEL-DWT-{entity}-{period}"
    path: "6A_project.dwt"
    metric: "vessel_dwt"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "DWT"

  - id_template: "FAC-VESSEL-LOA-{entity}-{period}"
    path: "6A_project.loa_m"
    metric: "vessel_loa_m"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "m"

  - id_template: "FAC-VESSEL-BEAM-{entity}-{period}"
    path: "6A_project.beam_m"
    metric: "vessel_beam_m"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "m"

  - id_template: "FAC-VESSEL-SPEED-{entity}-{period}"
    path: "6A_project.speed_knots"
    metric: "vessel_speed_knots"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "knots"

  - id_template: "FAC-CONTRACT-PRICE-USD-{entity}-{period}"
    path: "6A_project.contract_price_usd_m"
    metric: "contract_price_usd_m"
    entity: "VESSEL"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "FAC-LOAN-AMOUNT-USD-{entity}-{period}"
    path: "6A_project.loan_amount_usd_m"
    metric: "loan_amount_usd_m"
    entity: "VESSEL"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "RATIO-LTC-{entity}-{period}"
    path: "6A_project.ltc_pct"
    metric: "ltc_pct"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "pct"

  - id_template: "FAC-GRACE-PERIOD-DAYS-{entity}-{period}"
    path: "6A_project.grace_period_days"
    metric: "vessel_grace_period_days"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "days"

  # ── 6B Builder ────────────────────────────────────────────────────────
  - id_template: "RATIO-BUILDER-ONTIME-{entity}-{period}"
    path: "6B_builder.ontime_delivery_pct"
    metric: "builder_ontime_pct"
    entity: "BUILDER"
    period: "CURRENT"
    unit: "pct"

  # ── 6D Milestones (flat after ETL normalisation) ──────────────────────
  - id_template: "FAC-MILESTONE-1-AMT-{entity}-{period}"
    path: "6D_milestones.m1_amount_usd_m"
    metric: "milestone_1_amount_usd_m"
    entity: "VESSEL"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "RATIO-MILESTONE-1-PCT-{entity}-{period}"
