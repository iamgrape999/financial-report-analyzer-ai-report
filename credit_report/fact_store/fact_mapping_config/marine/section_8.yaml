# Section 8 — ACRA / Banking Charges: fact extraction mappings
facts:
  # Whether new banking charges have been imposed since last review
  - id_template: "ACRA-NEW-CHARGES-{entity}-CURRENT"
    path: "8A_acra_banking_charges.new_charges"
    metric: "new_banking_charges"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "boolean"

  # Analyst comments on ACRA charges (qualitative)
  - id_template: "ACRA-COMMENTS-{entity}-CURRENT"
    path: "8A_acra_banking_charges.comments"
    metric: "acra_charges_comments"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "text"

  # Total number of banking facilities (row count from 8B)
  - id_template: "BANKING-TOTAL-FACILITIES-{entity}-CURRENT"
    path: "8B_banking_changes.total_facilities"
    metric: "total_banking_facilities"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "count"

  # CUB total exposure in USD millions
  - id_template: "BANKING-CUB-TOTAL-USD-{entity}-CURRENT"
    path: "8B_banking_changes.cub_total_usd_m"
    metric: "cub_total_exposure_usd_m"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "USD_m"

  # CUB share of total banking facilities (%)
  - id_template: "BANKING-CUB-SHARE-PCT-{entity}-CURRENT"
    path: "8B_banking_changes.cub_share_pct"
    metric: "cub_share_pct"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "percent"
