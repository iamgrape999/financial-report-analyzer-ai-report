# Section 7 — Financial Analysis: fact extraction mappings
# Uses iterate_path for dynamic fiscal-year keys (FY2022, FY2023, FY2024, FY2025F, etc.)
# iterate_path: walks every key in the target dict, one fact per year.
facts:
  # ── Borrower: Income Statement ────────────────────────────────────────────────
  - id_template: "FIN-REVENUE-BORROW-{entity}-{period}"
    iterate_path: "7A_borrower_financials.income_statement"
    field: "revenue"
    metric: "revenue"
    entity: "BORROWER"
    id_template: "FIN-REVENUE-{entity}-{period}"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-EBITDA-{entity}-{period}"
    iterate_path: "7A_borrower_financials.income_statement"
    field: "ebitda"
    metric: "ebitda"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-EBIT-{entity}-{period}"
    iterate_path: "7A_borrower_financials.income_statement"
    field: "op_profit"
    metric: "ebit"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-NET-INCOME-{entity}-{period}"
    iterate_path: "7A_borrower_financials.income_statement"
    field: "net_income"
    metric: "net_income"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-GROSS-PROFIT-{entity}-{period}"
    iterate_path: "7A_borrower_financials.income_statement"
    field: "gross_profit"
    metric: "gross_profit"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  # ── Borrower: Balance Sheet ────────────────────────────────────────────────────
  - id_template: "FIN-TOTAL-ASSETS-{entity}-{period}"
    iterate_path: "7A_borrower_financials.balance_sheet"
    field: "total_assets"
    metric: "total_assets"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-TOTAL-EQUITY-{entity}-{period}"
    iterate_path: "7A_borrower_financials.balance_sheet"
    field: "total_equity"
    metric: "total_equity"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-TOTAL-DEBT-{entity}-{period}"
    iterate_path: "7A_borrower_financials.balance_sheet"
    field: "total_debt"
    metric: "total_debt"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-CASH-{entity}-{period}"
    iterate_path: "7A_borrower_financials.balance_sheet"
    field: "cash_and_equivalents"
    metric: "cash_and_equivalents"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-NET-DEBT-{entity}-{period}"
    iterate_path: "7A_borrower_financials.balance_sheet"
    field: "net_debt"
    metric: "net_debt"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  # ── Borrower: Cash Flow ────────────────────────────────────────────────────────
  - id_template: "FIN-CFO-{entity}-{period}"
    iterate_path: "7A_borrower_financials.cash_flow"
    field: "cfo"
    metric: "cash_flow_from_operations"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-CAPEX-{entity}-{period}"
    iterate_path: "7A_borrower_financials.cash_flow"
    field: "capex"
    metric: "capex"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  - id_template: "FIN-FCF-{entity}-{period}"
    iterate_path: "7A_borrower_financials.cash_flow"
    field: "free_cash_flow"
    metric: "free_cash_flow"
    entity: "BORROWER"
    currency_path: "7A_borrower_financials.reporting_currency"
    unit_path: "7A_borrower_financials.unit"

  # ── Borrower: Financial Ratios ─────────────────────────────────────────────────
  - id_template: "RATIO-DSCR-{entity}-{period}"
    iterate_path: "7A_borrower_financials.financial_ratios"
    field: "dscr"
    metric: "dscr"
    entity: "BORROWER"
    unit: "x"

  - id_template: "RATIO-GEARING-{entity}-{period}"
    iterate_path: "7A_borrower_financials.financial_ratios"
    field: "gearing_ratio"
    metric: "gearing_ratio"
    entity: "BORROWER"
    unit: "x"

  - id_template: "RATIO-LEVERAGE-{entity}-{period}"
    iterate_path: "7A_borrower_financials.financial_ratios"
    field: "net_debt_ebitda"
    metric: "net_debt_ebitda"
    entity: "BORROWER"
    unit: "x"

  - id_template: "RATIO-EBITDA-MARGIN-{entity}-{period}"
    iterate_path: "7A_borrower_financials.financial_ratios"
    field: "ebitda_margin_pct"
    metric: "ebitda_margin_pct"
    entity: "BORROWER"
    unit: "percent"

  - id_template: "RATIO-ROE-{entity}-{period}"
    iterate_path: "7A_borrower_financials.financial_ratios"
    field: "roe_pct"
    metric: "roe_pct"
    entity: "BORROWER"
    unit: "percent"

  - id_template: "RATIO-CURRENT-{entity}-{period}"
    iterate_path: "7A_borrower_financials.financial_ratios"
    field: "current_ratio"
    metric: "current_ratio"
    entity: "BORROWER"
    unit: "x"

  # ── Guarantor: Income Statement ────────────────────────────────────────────────
  - id_template: "FIN-REVENUE-{entity}-{period}"
    iterate_path: "7B_guarantor_financials.income_statement"
    field: "revenue"
    metric: "revenue"
    entity_path: "7B_guarantor_financials.reporting_entity"
    currency_path: "7B_guarantor_financials.reporting_currency"
    unit_path: "7B_guarantor_financials.unit"

  - id_template: "FIN-EBITDA-{entity}-{period}"
    iterate_path: "7B_guarantor_financials.income_statement"
    field: "ebitda"
    metric: "ebitda"
    entity_path: "7B_guarantor_financials.reporting_entity"
    currency_path: "7B_guarantor_financials.reporting_currency"
    unit_path: "7B_guarantor_financials.unit"

  - id_template: "FIN-NET-INCOME-{entity}-{period}"
    iterate_path: "7B_guarantor_financials.income_statement"
    field: "net_income"
    metric: "net_income"
    entity_path: "7B_guarantor_financials.reporting_entity"
    currency_path: "7B_guarantor_financials.reporting_currency"
    unit_path: "7B_guarantor_financials.unit"

  # ── Guarantor: Balance Sheet ───────────────────────────────────────────────────
  - id_template: "FIN-TOTAL-ASSETS-{entity}-{period}"
    iterate_path: "7B_guarantor_financials.balance_sheet"
    field: "total_assets"
    metric: "total_assets"
    entity_path: "7B_guarantor_financials.reporting_entity"
    currency_path: "7B_guarantor_financials.reporting_currency"
    unit_path: "7B_guarantor_financials.unit"

  - id_template: "FIN-TOTAL-DEBT-{entity}-{period}"
    iterate_path: "7B_guarantor_financials.balance_sheet"
    field: "total_debt"
    metric: "total_debt"
    entity_path: "7B_guarantor_financials.reporting_entity"
    currency_path: "7B_guarantor_financials.reporting_currency"
    unit_path: "7B_guarantor_financials.unit"

  # ── Guarantor: Ratios ──────────────────────────────────────────────────────────
  - id_template: "RATIO-DSCR-{entity}-{period}"
    iterate_path: "7B_guarantor_financials.financial_ratios"
    field: "dscr"
    metric: "dscr"
    entity_path: "7B_guarantor_financials.reporting_entity"
    unit: "x"

  - id_template: "RATIO-GEARING-{entity}-{period}"
    iterate_path: "7B_guarantor_financials.financial_ratios"
    field: "gearing_ratio"
    metric: "gearing_ratio"
    entity_path: "7B_guarantor_financials.reporting_entity"
    unit: "x"

  - id_template: "RATIO-LEVERAGE-{entity}-{period}"
    iterate_path: "7B_guarantor_financials.financial_ratios"
    field: "net_debt_ebitda"
    metric: "net_debt_ebitda"
    entity_path: "7B_guarantor_financials.reporting_entity"
    unit: "x"
