# Section 5 — Collateral / Responsible Person / Guarantor / Support
# All paths match the actual form FIELD_DEFS and ETL schema keys:
#   5B_refund_guarantee.*  — RG issuer details + flattened m1_*/m2_*/m3_*/m4_* milestones
#   5C_vessel_mortgage.*   — vessel mortgage metrics (LTC, ACR, LTV, valuations)
#   5E_value_maintenance_clause.*  — VMC covenant thresholds and cure period
#   5F_corporate_guarantee.*       — guarantor financial summary (flattened by _flatten_section5)
facts:
  # ── 5B Refund Guarantee ───────────────────────────────────────────────────
  - id_template: "RG-LAG-DAYS-{entity}-{period}"
    path: "5B_refund_guarantee.lag_time_days"
    metric: "rg_lag_time_days"
    entity: "RG"
    period: "CURRENT"
    unit: "days"

  - id_template: "RG-M1-AMT-{entity}-{period}"
    path: "5B_refund_guarantee.m1_rg_usd_m"
    metric: "rg_milestone_1_usd_m"
    entity: "RG"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "RG-M1-COV-{entity}-{period}"
    path: "5B_refund_guarantee.m1_coverage_pct"
    metric: "rg_milestone_1_coverage_pct"
    entity: "RG"
    period: "CURRENT"
    unit: "pct"

  - id_template: "RG-M2-AMT-{entity}-{period}"
    path: "5B_refund_guarantee.m2_rg_usd_m"
    metric: "rg_milestone_2_usd_m"
    entity: "RG"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "RG-M2-COV-{entity}-{period}"
    path: "5B_refund_guarantee.m2_coverage_pct"
    metric: "rg_milestone_2_coverage_pct"
    entity: "RG"
    period: "CURRENT"
    unit: "pct"

  - id_template: "RG-M3-AMT-{entity}-{period}"
    path: "5B_refund_guarantee.m3_rg_usd_m"
    metric: "rg_milestone_3_usd_m"
    entity: "RG"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "RG-M3-COV-{entity}-{period}"
    path: "5B_refund_guarantee.m3_coverage_pct"
    metric: "rg_milestone_3_coverage_pct"
    entity: "RG"
    period: "CURRENT"
    unit: "pct"

  - id_template: "RG-M4-AMT-{entity}-{period}"
    path: "5B_refund_guarantee.m4_rg_usd_m"
    metric: "rg_milestone_4_usd_m"
    entity: "RG"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "RG-M4-COV-{entity}-{period}"
    path: "5B_refund_guarantee.m4_coverage_pct"
    metric: "rg_milestone_4_coverage_pct"
    entity: "RG"
    period: "CURRENT"
    unit: "pct"

  # ── 5C Vessel Mortgage ────────────────────────────────────────────────────
  - id_template: "FAC-CONTRACT-PRICE-{entity}-{period}"
    path: "5C_vessel_mortgage.contract_price_usd_m"
    metric: "contract_price_usd_m"
    entity: "VESSEL"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "FAC-LOAN-AMOUNT-{entity}-{period}"
    path: "5C_vessel_mortgage.loan_amount_usd_m"
    metric: "loan_amount_usd_m"
    entity: "VESSEL"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  - id_template: "RATIO-LTC-5C-{entity}-{period}"
    path: "5C_vessel_mortgage.ltc_pct"
    metric: "ltc_pct"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "pct"

  - id_template: "RATIO-ACR-DELIVERY-{entity}-{period}"
    path: "5C_vessel_mortgage.acr_at_delivery_pct"
    metric: "acr_at_delivery_pct"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "pct"

  - id_template: "RATIO-LTV-MATURITY-{entity}-{period}"
    path: "5C_vessel_mortgage.ltv_at_maturity_pct"
    metric: "ltv_at_maturity_pct"
    entity: "VESSEL"
    period: "CURRENT"
    unit: "pct"

  - id_template: "FAC-VESSEL-MV-{entity}-{period}"
    path: "5C_vessel_mortgage.market_value_usd_m"
    metric: "vessel_market_value_usd_m"
    entity: "VESSEL"
    period: "CURRENT"
    currency: "USD"
    unit: "million"

  # ── 5E Value Maintenance Clause ───────────────────────────────────────────
  - id_template: "RATIO-ACR-COVENANT-{entity}-{period}"
    path: "5E_value_maintenance_clause.acr_covenant_pct"
    metric: "acr_minimum_pct"
    entity: "FACILITY"
    period: "CURRENT"
    unit: "pct"

  - id_template: "RATIO-LTV-COVENANT-{entity}-{period}"
    path: "5E_value_maintenance_clause.ltv_covenant_pct"
    metric: "ltv_maximum_pct"
    entity: "FACILITY"
    period: "CURRENT"
    unit: "pct"

  - id_template: "FAC-CURE-PERIOD-DAYS-{entity}-{period}"
    path: "5E_value_maintenance_clause.cure_period_banking_days"
    metric: "vmc_cure_period_days"
    entity: "FACILITY"
    period: "CURRENT"
    unit: "days"

  # ── 5F Corporate Guarantee — guarantor financial snapshot ─────────────────
  # These fields are populated by _flatten_section5 which flattens
  # guarantor_financials[{metric, fy_current_twd_bn, fy_current_usd_bn}] array.
  - id_template: "FX-RATE-TWD-USD-{entity}-{period}"
    path: "5F_corporate_guarantee.fx_rate_to_usd"
    metric: "fx_rate_twd_usd"
    entity: "GUARANTOR"
    period: "CURRENT"
    unit: "ratio"

  - id_template: "FIN-CASH-TWD-GUAR-{entity}-{period}"
    path: "5F_corporate_guarantee.cash_twd_bn"
    metric: "guarantor_cash_twd_bn"
    entity: "GUARANTOR"
    period: "CURRENT"
    currency: "TWD"
    unit: "billion"

  - id_template: "FIN-CASH-USD-GUAR-{entity}-{period}"
    path: "5F_corporate_guarantee.cash_usd_bn"
    metric: "guarantor_cash_usd_bn"
    entity: "GUARANTOR"
    period: "CURRENT"
    currency: "USD"
    unit: "billion"

  - id_template: "FIN-DEBT-TWD-GUAR-{entity}-{period}"
    path: "5F_corporate_guarantee.total_debt_twd_bn"
    metric: "guarantor_total_debt_twd_bn"
    entity: "GUARANTOR"
    period: "CURRENT"
    currency: "TWD"
    unit: "billion"

  - id_template: "FIN-NW-TWD-GUAR-{entity}-{period}"
    path: "5F_corporate_guarantee.net_worth_twd_bn"
    metric: "guarantor_net_worth_twd"
    entity: "GUARANTOR"
    period: "CURRENT"
    currency: "TWD"
    unit: "billion"

  - id_template: "FIN-REVENUE-TWD-GUAR-{entity}-{period}"
    path: "5F_corporate_guarantee.revenue_twd_bn"
    metric: "guarantor_revenue_twd"
    entity: "GUARANTOR"
    period: "CURRENT"
    currency: "TWD"
    unit: "billion"

  - id_template: "FIN-EBITDA-TWD-GUAR-{entity}-{period}"
    path: "5F_corporate_guarantee.ebitda_twd_bn"
    metric: "guarantor_ebitda_twd"
    entity: "GUARANTOR"
    period: "CURRENT"
    currency: "TWD"
    unit: "billion"

  - id_template: "RATIO-ICR-GUAR-{entity}-{period}"
    path: "5F_corporate_guarantee.interest_coverage"
    metric: "guarantor_interest_coverage"
    entity: "GUARANTOR"
    period: "CURRENT"
    unit: "x"

  - id_template: "RATIO-NI-MARGIN-GUAR-{entity}-{period}"
    path: "5F_corporate_guarantee.net_margin_pct"
    metric: "guarantor_net_margin_pct"
    entity: "GUARANTOR"
    period: "CURRENT"
    unit: "pct"

  - id_template: "RATIO-ROE-GUAR-{entity}-{period}"
    path: "5F_corporate_guarantee.roe_pct"
    metric: "guarantor_roe_pct"
    entity: "GUARANTOR"
    period: "CURRENT"
    unit: "pct"
