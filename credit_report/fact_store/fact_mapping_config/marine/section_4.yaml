# Section 4 — Borrower Background: fact extraction mappings
facts:
  # ── Ownership ────────────────────────────────────────────────────────────────
  - id_template: "OWN-UBO-STAKE-{entity}-CURRENT"
    path: "4B_ownership.ubo_stake_pct"
    metric: "ubo_stake_pct"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "percent"

  - id_template: "OWN-SHAREHOLDER0-STAKE-{entity}-CURRENT"
    path: "4B_ownership.shareholders[0].stake_percent"
    metric: "shareholder_stake"
    entity_path: "4B_ownership.shareholders[0].name"
    period: "CURRENT"
    unit: "percent"

  - id_template: "OWN-SHAREHOLDER1-STAKE-{entity}-CURRENT"
    path: "4B_ownership.shareholders[1].stake_percent"
    metric: "shareholder_stake"
    entity_path: "4B_ownership.shareholders[1].name"
    period: "CURRENT"
    unit: "percent"

  - id_template: "OWN-SHAREHOLDER2-STAKE-{entity}-CURRENT"
    path: "4B_ownership.shareholders[2].stake_percent"
    metric: "shareholder_stake"
    entity_path: "4B_ownership.shareholders[2].name"
    period: "CURRENT"
    unit: "percent"

  # ── Business profile ─────────────────────────────────────────────────────────
  - id_template: "BUS-MARKET-SHARE-{entity}-CURRENT"
    path: "4D_business.market_share_pct"
    metric: "market_share_pct"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "percent"

  - id_template: "BUS-CARGO-VOLUME-{entity}-CURRENT"
    path: "4D_business.annual_cargo_volume_m_teu"
    metric: "annual_cargo_volume_m_teu"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "million TEU"

  - id_template: "BUS-GLOBAL-RANKING-{entity}-CURRENT"
    path: "4D_business.global_ranking"
    metric: "global_ranking"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "rank"

  - id_template: "BUS-SERVICE-ROUTES-{entity}-CURRENT"
    path: "4D_business.global_service_routes"
    metric: "global_service_routes"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "routes"

  # ── Summary financials (snapshot, typically most recent FY) ───────────────────
  - id_template: "FIN4-REVENUE-{entity}-{period}"
    path: "4E_financials.revenue"
    metric: "revenue"
    entity: "BORROWER"
    period_path: "4E_financials.fiscal_year"
    currency_path: "4E_financials.currency"
    unit_path: "4E_financials.unit"

  - id_template: "FIN4-EBITDA-{entity}-{period}"
    path: "4E_financials.ebitda"
    metric: "ebitda"
    entity: "BORROWER"
    period_path: "4E_financials.fiscal_year"
    currency_path: "4E_financials.currency"
    unit_path: "4E_financials.unit"

  - id_template: "FIN4-EBITDA-MARGIN-{entity}-{period}"
    path: "4E_financials.ebitda_margin_pct"
    metric: "ebitda_margin_pct"
    entity: "BORROWER"
    period_path: "4E_financials.fiscal_year"
    unit: "percent"

  - id_template: "FIN4-NET-INCOME-{entity}-{period}"
    path: "4E_financials.net_income"
    metric: "net_income"
    entity: "BORROWER"
    period_path: "4E_financials.fiscal_year"
    currency_path: "4E_financials.currency"
    unit_path: "4E_financials.unit"

  - id_template: "FIN4-NET-DEBT-EBITDA-{entity}-{period}"
    path: "4E_financials.net_debt_ebitda"
    metric: "net_debt_ebitda"
    entity: "BORROWER"
    period_path: "4E_financials.fiscal_year"
    unit: "x"

  - id_template: "FIN4-NET-CASH-DEBT-{entity}-{period}"
    path: "4E_financials.net_cash_debt"
    metric: "net_cash_debt"
    entity: "BORROWER"
    period_path: "4E_financials.fiscal_year"
    currency_path: "4E_financials.currency"
    unit_path: "4E_financials.unit"

  # ── Fleet profile ─────────────────────────────────────────────────────────────
  - id_template: "FLEET-TOTAL-TEU-{entity}-CURRENT"
    path: "4F_fleet.total_fleet_teu"
    metric: "total_fleet_teu"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "TEU"

  - id_template: "FLEET-TOTAL-VESSELS-{entity}-CURRENT"
    path: "4F_fleet.total_vessels"
    metric: "total_fleet_vessels"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "vessels"

  - id_template: "FLEET-OWNED-TEU-{entity}-CURRENT"
    path: "4F_fleet.total_owned_teu"
    metric: "owned_fleet_teu"
    entity: "BORROWER"
    period: "CURRENT"
    unit: "TEU"

  # ── Market data ────────────────────────────────────────────────────────────────
  - id_template: "MKT-CCFI-{entity}-CURRENT"
    path: "4I_market_data.ccfi_level"
    metric: "ccfi_index"
    entity: "MARKET"
    period: "CURRENT"
    unit: "index"

  - id_template: "MKT-SCFI-{entity}-CURRENT"
    path: "4I_market_data.scfi_level"
    metric: "scfi_index"
    entity: "MARKET"
    period: "CURRENT"
    unit: "index"

  - id_template: "MKT-ORDER-BOOK-PCT-{entity}-CURRENT"
    path: "4I_market_data.order_book_pct_of_fleet"
    metric: "order_book_pct_of_fleet"
    entity: "MARKET"
    period: "CURRENT"
    unit: "percent"

  - id_template: "MKT-WTI-{entity}-CURRENT"
    path: "4I_market_data.wti_latest"
    metric: "wti_crude_usd_bbl"
    entity: "MARKET"
    period: "CURRENT"
    currency: "USD"
    unit: "per barrel"

  - id_template: "MKT-BRENT-{entity}-CURRENT"
    path: "4I_market_data.brent_latest"
    metric: "brent_crude_usd_bbl"
    entity: "MARKET"
    period: "CURRENT"
    currency: "USD"
    unit: "per barrel"

  # ── Freight rates by route ────────────────────────────────────────────────────
  - id_template: "FREIGHT-FE-NAM-{entity}-CURRENT"
    path: "4I_market_data.freight_rate_by_route.far_east_north_america_usd_teu"
    metric: "freight_rate_fe_nam"
    entity: "MARKET"
    period: "CURRENT"
    currency: "USD"
    unit: "per TEU"

  - id_template: "FREIGHT-FE-EUR-{entity}-CURRENT"
    path: "4I_market_data.freight_rate_by_route.far_east_europe_usd_teu"
    metric: "freight_rate_fe_europe"
    entity: "MARKET"
    period: "CURRENT"
    currency: "USD"
    unit: "per TEU"
