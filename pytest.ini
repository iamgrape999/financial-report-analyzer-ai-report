[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Retry transient SQLite "database is locked" errors that occur when background
# generation tasks from a prior test are still writing audit events when the
# next test's fixture starts. 2 retries with 3s delay is sufficient.
addopts = --reruns 2 --reruns-delay 3
filterwarnings =
    ignore::DeprecationWarning:passlib
    ignore::sqlalchemy.exc.SAWarning
