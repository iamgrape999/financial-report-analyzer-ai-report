services:
  - type: web
    name: financial-report-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && mkdir -p data/credit_reports data/memory data/logs
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: credit-report-data
      mountPath: /opt/render/project/src/data
      sizeGB: 10
    healthCheckPath: /health
    envVars:
      # Optional: set to a PostgreSQL connection string for persistent storage.
      # If not set, the app uses SQLite (data resets on each deploy on Render free tier).
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # One-time setup key for creating the first admin via POST /api/credit-report/auth/setup
      # Set any secret string here, use it once, then remove it.
      - key: SETUP_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DAILY_TOKEN_LIMIT
        value: "4000000"
      - key: CR_MAX_CONCURRENT_GENERATIONS
        value: "1"
      - key: CR_MAX_CONCURRENT_EXTRACTIONS
        value: "1"
      - key: CREDIT_REPORT_MAX_UPLOAD_MB
        value: "20"
      - key: CR_ETL_MAX_TEXT_CHARS
        value: "500000"
      - key: CR_OCR_MAX_PDF_MB
        value: "50"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
