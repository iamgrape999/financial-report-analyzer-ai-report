services:
  - type: web
    name: financial-report-analyzer
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && mkdir -p data/credit_reports data/memory data/logs
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Optional: set to a PostgreSQL connection string for persistent storage.
      # If not set, the app uses SQLite (data resets on each deploy on Render free tier).
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_OCR_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_ETL_MODEL
        value: gemini-2.5-flash-lite
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # One-time setup key for creating the first admin via POST /api/credit-report/auth/setup
      # Set any secret string here, use it once, then remove it.
      - key: SETUP_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DAILY_TOKEN_LIMIT
        value: "4000000"
      - key: CR_MAX_CONCURRENT_GENERATIONS
        value: "1"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      # IMPORTANT: Set to your deployed frontend origin. Wildcard "*" is insecure in production.
      # Example: https://financial-report-analyzer-zi6o.onrender.com
      - key: CORS_ALLOW_ORIGINS
        value: "https://financial-report-analyzer-zi6o.onrender.com"
