<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Report Analyzer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  body { background: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; }
  .navbar { background: linear-gradient(135deg, #1a3a5c 0%, #0d6efd 100%); }
  .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card-header { border-radius: 12px 12px 0 0 !important; font-weight: 600; }
  #loginCard { max-width: 420px; margin: 6rem auto; }
  .section-badge { width: 32px; height: 32px; border-radius: 50%; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; }
  .status-done { background:#d1fae5; color:#065f46; }
  .status-generating { background:#fef3c7; color:#92400e; }
  .status-error { background:#fee2e2; color:#991b1b; }
  .status-pending { background:#e5e7eb; color:#374151; }
  .markdown-output { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:1.5rem; max-height:600px; overflow-y:auto; font-size:14px; line-height:1.7; }
  .markdown-output table { border-collapse:collapse; width:100%; margin:1rem 0; font-size:13px; }
  .markdown-output th, .markdown-output td { border:1px solid #d1d5db; padding:6px 12px; text-align:left; }
  .markdown-output th { background:#f9fafb; font-weight:600; }
  .markdown-output h2 { font-size:1.3rem; margin-top:1.5rem; border-bottom:2px solid #e5e7eb; padding-bottom:6px; }
  .markdown-output h3 { font-size:1.1rem; margin-top:1.2rem; color:#1a3a5c; }
  .spinner-sm { width:14px; height:14px; border-width:2px; }
  #toast-container { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; }
  .view { display:none; }
  .view.active { display:block; }
  .report-row { cursor:pointer; transition:background .15s; }
  .report-row:hover { background:#f8faff; }
  .section-row { cursor:pointer; transition:background .15s; }
  .section-row:hover td { background:#f8faff; }
  .doc-pill { background:#e0e7ff; color:#3730a3; border-radius:20px; padding:2px 10px; font-size:12px; display:inline-block; margin:2px; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3 py-2">
  <span class="navbar-brand fw-bold fs-5">📊 Financial Report Analyzer</span>
  <div id="navUser" class="d-none text-white small">
    <span id="navRole" class="badge bg-light text-dark me-2"></span>
    <span id="navEmail" class="me-3"></span>
    <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- Toast -->
<div id="toast-container"></div>

<!-- LOGIN VIEW -->
<div id="viewLogin" class="view active container">
  <div id="loginCard" class="card p-4">
    <h4 class="text-center mb-4 fw-bold text-primary">Sign In</h4>
    <div id="loginError" class="alert alert-danger d-none"></div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input id="loginEmail" type="email" class="form-control" placeholder="analyst@bank.com" autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input id="loginPassword" type="password" class="form-control" placeholder="••••••••">
    </div>
    <button class="btn btn-primary w-100 fw-semibold" onclick="doLogin()">
      <span id="loginSpinner" class="spinner-border spinner-sm d-none me-2"></span>Sign In
    </button>
  </div>
</div>

<!-- DASHBOARD VIEW -->
<div id="viewDashboard" class="view container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">📋 Reports</h4>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">+ New Report</button>
  </div>
  <div class="card">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">Borrower</th>
            <th>Type</th>
            <th>Branch</th>
            <th>Status</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="reportTableBody">
          <tr><td colspan="5" class="text-center text-muted py-4">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- REPORT DETAIL VIEW -->
<div id="viewReport" class="view container py-4">
  <button class="btn btn-outline-secondary btn-sm mb-3" onclick="showDashboard()">← Back to Reports</button>

  <div class="row g-3 mb-3">
    <div class="col-md-8">
      <div class="card h-100">
        <div class="card-header bg-primary text-white">Report Details</div>
        <div class="card-body" id="reportMeta"></div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-header">Actions</div>
        <div class="card-body d-flex flex-column gap-2">
          <button class="btn btn-success fw-semibold" onclick="generateAll()">
            <span id="genAllSpinner" class="spinner-border spinner-sm d-none me-2"></span>⚡ Generate Full Report
          </button>
          <button class="btn btn-outline-secondary btn-sm" onclick="loadReportDetail(currentReportId)">🔄 Refresh</button>
          <hr class="my-1">
          <label class="form-label fw-semibold mb-0">Upload PDF Evidence</label>
          <input type="file" id="pdfInput" accept=".pdf" class="form-control form-control-sm">
          <button class="btn btn-outline-primary btn-sm" onclick="uploadPDF()">Upload PDF</button>
          <div id="docList" class="mt-2"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Section Status Table -->
  <div class="card mb-3">
    <div class="card-header">Sections (click to view / generate)</div>
    <div class="card-body p-0">
      <table class="table table-sm mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">#</th>
            <th>Section</th>
            <th>Status</th>
            <th>Tokens</th>
            <th>Generated</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="sectionsTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Section Output Panel -->
  <div class="card" id="sectionOutputPanel" style="display:none">
    <div class="card-header d-flex justify-content-between">
      <span id="sectionOutputTitle">Section Output</span>
      <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('sectionOutputPanel').style.display='none'">×</button>
    </div>
    <div class="card-body">
      <div id="sectionOutputContent" class="markdown-output"></div>
    </div>
  </div>
</div>

<!-- Create Report Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">New Report</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Borrower Name</label>
          <input id="newBorrower" class="form-control" placeholder="ACME Shipping Ltd.">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Industry</label>
          <select id="newIndustry" class="form-select">
            <option value="marine">Marine / Shipping</option>
            <option value="corporate">Corporate</option>
            <option value="trade">Trade Finance</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Report Type</label>
          <input id="newType" class="form-control" placeholder="e.g. Credit Risk Assessment">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Booking Branch</label>
          <input id="newBranch" class="form-control" placeholder="e.g. Singapore">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary fw-semibold" onclick="createReport()">Create Report</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = '/api/credit-report';
let token = localStorage.getItem('token');
let currentRole = localStorage.getItem('role');
let currentEmail = localStorage.getItem('email');
let currentReportId = null;
const SECTION_NAMES = {
  1:'Facility Structure & Key Terms', 2:'Overall Comments', 3:'Credit Risk Assessment',
  4:'Borrower Background', 5:'Collateral Assessment', 6:'Project Overview',
  7:'Financial Analysis', 8:'Legal Documentation & Charges', 9:'Compliance Checklist', 10:'Appendix'
};

// ── Auth ────────────────────────────────────────────────────────────────────
function authHeaders() {
  return { 'Authorization': 'Bearer ' + token };
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const spin = document.getElementById('loginSpinner');
  errEl.classList.add('d-none');
  spin.classList.remove('d-none');

  try {
    const body = new URLSearchParams({ username: email, password: pw });
    const res = await fetch(API + '/auth/login', { method: 'POST', body });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');
    token = data.access_token;
    currentRole = data.role;
    currentEmail = email;
    localStorage.setItem('token', token);
    localStorage.setItem('role', currentRole);
    localStorage.setItem('email', currentEmail);
    showDashboard();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('d-none');
  } finally {
    spin.classList.add('d-none');
  }
}

function logout() {
  localStorage.clear();
  token = null; currentRole = null; currentEmail = null; currentReportId = null;
  showView('viewLogin');
  document.getElementById('navUser').classList.add('d-none');
}

// ── Views ───────────────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function showDashboard() {
  showView('viewDashboard');
  document.getElementById('navUser').classList.remove('d-none');
  document.getElementById('navRole').textContent = currentRole;
  document.getElementById('navEmail').textContent = currentEmail;
  await loadReports();
}

// ── Reports ─────────────────────────────────────────────────────────────────
async function loadReports() {
  const tbody = document.getElementById('reportTableBody');
  tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Loading…</td></tr>';
  try {
    const res = await fetch(API + '/reports?limit=50', { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    const reports = await res.json();
    if (!reports.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No reports yet. Click "New Report" to create one.</td></tr>';
      return;
    }
    tbody.innerHTML = reports.map(r => `
      <tr class="report-row" onclick="loadReportDetail('${r.id}')">
        <td class="ps-3 fw-semibold">${esc(r.borrower_name || '—')}</td>
        <td>${esc(r.report_type || '—')}</td>
        <td>${esc(r.booking_branch || '—')}</td>
        <td>${statusBadge(r.status)}</td>
        <td class="text-muted small">${fmtDate(r.created_at)}</td>
      </tr>`).join('');
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">${esc(e.message)}</td></tr>`;
  }
}

async function createReport() {
  const payload = {
    borrower_name: document.getElementById('newBorrower').value.trim() || null,
    industry: document.getElementById('newIndustry').value,
    report_type: document.getElementById('newType').value.trim() || null,
    booking_branch: document.getElementById('newBranch').value.trim() || null,
  };
  try {
    const res = await fetch(API + '/reports', {
      method: 'POST', headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Failed to create report');
    bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
    toast('Report created', 'success');
    await loadReportDetail(data.id);
  } catch (e) {
    toast(e.message, 'danger');
  }
}

// ── Report Detail ────────────────────────────────────────────────────────────
async function loadReportDetail(reportId) {
  currentReportId = reportId;
  showView('viewReport');
  document.getElementById('sectionOutputPanel').style.display = 'none';
  document.getElementById('reportMeta').innerHTML = '<div class="text-muted small">Loading…</div>';
  document.getElementById('sectionsTable').innerHTML = '<tr><td colspan="6" class="text-center py-3 text-muted">Loading…</td></tr>';

  try {
    const [repRes, outsRes, docsRes] = await Promise.all([
      fetch(API + '/reports/' + reportId, { headers: authHeaders() }),
      fetch(API + '/reports/' + reportId + '/outputs', { headers: authHeaders() }),
      fetch(API + '/reports/' + reportId + '/documents', { headers: authHeaders() }),
    ]);
    const report = await repRes.json();
    const outputs = outsRes.ok ? await outsRes.json() : [];
    const docs = docsRes.ok ? await docsRes.json() : [];

    // Meta
    document.getElementById('reportMeta').innerHTML = `
      <div class="row g-2">
        <div class="col-6"><small class="text-muted">Borrower</small><div class="fw-semibold">${esc(report.borrower_name || '—')}</div></div>
        <div class="col-6"><small class="text-muted">Industry</small><div>${esc(report.industry)}</div></div>
        <div class="col-6"><small class="text-muted">Type</small><div>${esc(report.report_type || '—')}</div></div>
        <div class="col-6"><small class="text-muted">Branch</small><div>${esc(report.booking_branch || '—')}</div></div>
        <div class="col-6"><small class="text-muted">Status</small><div>${statusBadge(report.status)}</div></div>
        <div class="col-6"><small class="text-muted">Created</small><div class="small text-muted">${fmtDate(report.created_at)}</div></div>
      </div>`;

    // Docs
    const docList = document.getElementById('docList');
    docList.innerHTML = docs.length
      ? docs.map(d => `<span class="doc-pill" title="${esc(d.original_filename)} (${fmtBytes(d.file_size_bytes)})">${esc(d.original_filename)}</span>`).join('')
      : '<small class="text-muted">No documents uploaded.</small>';

    // Sections
    const outMap = {};
    outputs.forEach(o => outMap[o.section_no] = o);
    const tbody = document.getElementById('sectionsTable');
    tbody.innerHTML = Object.keys(SECTION_NAMES).map(no => {
      const n = parseInt(no);
      const o = outMap[n];
      const statusCls = o ? (o.status === 'done' ? 'done' : o.status === 'generating' ? 'generating' : o.status === 'error' ? 'error' : 'pending') : 'pending';
      const statusLabel = o ? o.status : 'not started';
      const tokens = o?.tokens_used ? (o.tokens_used).toLocaleString() : '—';
      const genAt = o?.generated_at ? fmtDate(o.generated_at) : '—';
      return `
        <tr class="section-row" onclick="showSectionOutput(${n}, ${JSON.stringify(SECTION_NAMES[no])})">
          <td class="ps-3"><span class="section-badge status-${statusCls}">${n}</span></td>
          <td>${SECTION_NAMES[no]}</td>
          <td><span class="badge bg-${statusCls === 'done' ? 'success' : statusCls === 'generating' ? 'warning text-dark' : statusCls === 'error' ? 'danger' : 'secondary'}">${statusLabel}</span></td>
          <td class="small text-muted">${tokens}</td>
          <td class="small text-muted">${genAt}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation();generateSection(${n})" title="Generate section ${n}">▶</button>
          </td>
        </tr>`;
    }).join('');
  } catch (e) {
    toast(e.message, 'danger');
  }
}

async function showSectionOutput(sectionNo, name) {
  const panel = document.getElementById('sectionOutputPanel');
  document.getElementById('sectionOutputTitle').textContent = `Section ${sectionNo} — ${name}`;
  document.getElementById('sectionOutputContent').innerHTML = '<div class="text-muted">Loading…</div>';
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    const res = await fetch(API + '/reports/' + currentReportId + '/sections/' + sectionNo + '/output', { headers: authHeaders() });
    if (!res.ok) {
      document.getElementById('sectionOutputContent').innerHTML = '<div class="text-muted fst-italic">Not yet generated.</div>';
      return;
    }
    const data = await res.json();
    document.getElementById('sectionOutputContent').innerHTML = data.markdown
      ? marked.parse(data.markdown)
      : '<div class="text-muted fst-italic">No content available.</div>';
  } catch (e) {
    document.getElementById('sectionOutputContent').innerHTML = `<div class="text-danger">${esc(e.message)}</div>`;
  }
}

async function generateSection(sectionNo) {
  toast(`Generating section ${sectionNo}…`, 'info');
  try {
    const res = await fetch(API + '/reports/' + currentReportId + '/generate/' + sectionNo, {
      method: 'POST', headers: authHeaders()
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Generation failed');
    toast(`Section ${sectionNo}: ${data.status} (${(data.tokens_used||0).toLocaleString()} tokens)`, 'success');
    await loadReportDetail(currentReportId);
  } catch (e) {
    toast(e.message, 'danger');
  }
}

async function generateAll() {
  const spin = document.getElementById('genAllSpinner');
  spin.classList.remove('d-none');
  toast('Generating full report — this may take several minutes…', 'info');
  try {
    const res = await fetch(API + '/reports/' + currentReportId + '/generate', {
      method: 'POST', headers: authHeaders()
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Generation failed');
    const statuses = Object.entries(data.sections).map(([k,v]) => `§${k}:${v}`).join(', ');
    toast('Full report generated. ' + statuses, 'success');
    await loadReportDetail(currentReportId);
  } catch (e) {
    toast(e.message, 'danger');
  } finally {
    spin.classList.add('d-none');
  }
}

async function uploadPDF() {
  const input = document.getElementById('pdfInput');
  if (!input.files.length) { toast('Please select a PDF file', 'warning'); return; }
  const file = input.files[0];
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(API + '/reports/' + currentReportId + '/documents', {
      method: 'POST', headers: authHeaders(), body: form
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');
    toast(`Uploaded: ${file.name}`, 'success');
    input.value = '';
    await loadReportDetail(currentReportId);
  } catch (e) {
    toast(e.message, 'danger');
  }
}

// ── Utilities ────────────────────────────────────────────────────────────────
function statusBadge(s) {
  const map = { draft:'secondary', validated:'info', review_in_progress:'warning', approved:'success' };
  return `<span class="badge bg-${map[s]||'secondary'}">${s}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(1) + ' MB';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `alert alert-${type} py-2 px-3 shadow-sm`;
  el.style.cssText = 'min-width:260px;max-width:400px;font-size:13px;animation:fadeIn .3s;';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

// ── Enter key support ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('viewLogin').classList.contains('active')) doLogin();
});

// ── Init ─────────────────────────────────────────────────────────────────────
if (token) {
  showDashboard();
} else {
  showView('viewLogin');
}
</script>
</body>
</html>
